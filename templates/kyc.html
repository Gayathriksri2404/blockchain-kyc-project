<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>KYC Verification</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        width: 420px;
        padding: 30px 35px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-size: 14px;
        color: #ddd;
    }

    input[type="text"],
    input[type="file"] {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        margin-bottom: 16px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.15);
        color: white;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: translateY(-2px);
    }

    .error {
        color: #ff6b6b;
        margin-bottom: 15px;
        text-align: center;
        font-weight: bold;
    }

    .hash-box {
        margin-top: 20px;
        padding: 10px;
        background: rgba(0,0,0,0.4);
        border-radius: 8px;
        font-size: 13px;
        word-break: break-all;
    }
</style>

</head>

<body>

<div class="container">
    <h2>🔐 Customer KYC Verification</h2>


{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

<form method="POST" enctype="multipart/form-data">

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Aadhaar Number</label>
    <input type="text"
           name="aadhaar"
           pattern="\d{12}"
           maxlength="12"
           title="Aadhaar must be exactly 12 digits"
           required>

    <label>PAN Number</label>
    <input type="text"
           name="pan"
           pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
           title="Enter valid PAN (ABCDE1234F)"
           required>

    <label>Phone Number</label>
    <input type="text"
           name="phone"
           pattern="\d{10}"
           maxlength="10"
           title="Enter valid 10-digit mobile number"
           required>

    <label>Upload Photo</label>
    <input type="file" name="photo" accept="image/*" required>

    <label>Upload PAN Card</label>
    <input type="file" name="pan_card" accept="image/*,.pdf" required>

    <label>Upload Address Proof</label>
    <input type="file" name="address_proof" accept="image/*,.pdf" required>

    <button class="btn" type="submit">Verify & Generate Hash</button>
</form>

<div class="back-link">
    <a href="/dashboard">
        <button>⬅ Back to Dashboard</button>
    </a>
</div>




{% if hash %}
    <div class="hash-box">
        <strong>KYC Hash Generated:</strong><br>
        {{ hash }}
    </div>
{% endif %}


</div>

</body>

</html>
